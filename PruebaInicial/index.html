    <style>
      body { margin: 0;

    .navbar {
  overflow: hidden;
  background-color: BlueViolet;
  font-family: 'Titan One';
  width: 60%;
  height: 40px;
  text-align: center;
  margin-left: 20%;
  margin-bottom: 10px;
  border-radius: 25px;
  border: 2px solid DarkViolet;
  padding: 0px;

  
}

.navbar a {
  float: left;
  font-size: 16px;
  color: GhostWhite;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  margin-top: 0px;
}

.navbar a:hover, .dropdown:hover .dropbtn {
  background-color: GhostWhite;
  color: blueviolet;
}
 

textarea {
  overflow-y: scroll;
  height: 580px;
  width: 90%;
  resize: none; /* Remove this if you want the user to resize the textarea */
  border-radius: 15px;
  border: 2px solid DarkViolet;
  padding: 10px;
  font-family: 'Roboto Slab';
}
button {
  background-color: BlueViolet; 
  color: GhostWhite; 
  border-color: BlueViolet; 
  height: 60px; width: 80%; 
  font-size:xx-large ; 
  margin-top: 10px;
  border-radius: 25px;
  border: 2px solid DarkViolet;
  padding: 0px;
  font-family: 'Titan One';

}

button:hover {
  background-color: GhostWhite; 
  color: blueviolet
}

.box {
  width: 40%;
  margin: 0 auto;
  background: rgba(255,255,255,0.2);
  padding: 35px;
  border: 2px solid #fff;
  border-radius: 20px/50px;
  background-clip: padding-box;
  text-align: center;
}

.button {
  cursor: pointer;
}

.overlay {
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0, 0, 0, 0.7);
  transition: opacity 500ms;
  visibility: hidden;
  opacity: 0;
}
.overlay:target {
  visibility: visible;
  opacity: 1;
}

.popup {
  margin: 70px auto;
  padding: 20px;
  background: #fff;
  border-radius: 15px;
  width: 70%;
  position: relative;
  transition: all 5s ease-in-out;
  font-family: 'Roboto Slab';
  text-align: center;
  
}

.popup h2 {
  margin-top: 0;
  color: #333;
  font-family: 'Titan One';
}
.popup .close {
  position: absolute;
  top: -5px;
  right: 20px;
  transition: all 200ms;
  font-size: 50px;
  font-weight: bold;
  text-decoration: none;
  color: #333;
  font-family: 'Titan One';
}
.popup .close:hover {
  color: blueviolet;
}
.popup .content {
  max-height: 30%;
  overflow: auto;
  text-align: center;
}

@media screen and (max-width: 900px){
  .box{
    width: 90%;
  }
  .popup{
    width: 90%;
    text-align: center;
  }
}

table {
  border-collapse: collapse;
  width: 50%;
  font-size: 12px;
  margin-left: 25%;
}

td, th {
  border: 1px solid blueviolet;
  text-align: center;
  padding: 8px;
}
th {color:blueviolet;}
tr:nth-child(even) {
  background-color: lavender;
}

</style>
